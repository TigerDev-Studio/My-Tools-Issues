name: Other or new tool
description: Report an issue, request, or question for a tool that is not listed.
title: "[Other]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form only when the tool is not listed in the normal bug, feature, or question forms.

  - type: input
    id: tool-name
    attributes:
      label: Tool name
      description: Enter the exact tool or extension name.
      placeholder: "Example: My New VS Code Extension"
    validations:
      required: true

  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - Bug report
        - Feature request
        - Question
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tool version
      placeholder: "Example: 1.2.0"

  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: "Example: 1.92.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the bug, feature request, or question.
      placeholder: |
        What happened?
        What did you expect?
        What should be improved?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or attach screenshots. Remove secrets before posting.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I removed tokens, passwords, SSH keys, private repository URLs, and other secrets.
          required: true
        - label: I searched existing issues before creating this report.
          required: true
